on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate log
        run: |
          mkdir -p logs
          echo "Run ID: ${{ github.run_id }}" >> logs/run.log
          echo "Actor: ${{ github.actor }}" >> logs/run.log
          echo "Time: $(date)" >> logs/run.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: logs/
