name: 🔄 Auto Review Issues & PRs

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto review issues & PRs
        uses: actions/github-script@v7
        with:
          script: |
            // --- Review Issues ---
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            for (const issue of issues) {
              const title = issue.title.toLowerCase();
              let labels = [];

              if (title.includes("bug") || title.includes("fix")) labels.push("bug");
              if (title.includes("feature") || title.includes("enhancement")) labels.push("enhancement");
              if (title.includes("docs") || title.includes("doc")) labels.push("documentation");

              if (labels.length > 0) {
                await github.rest.issues.addLabels({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels
                });

                await github.rest.issues.createComment({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `🤖 Auto-review: Applied labels [${labels.join(", ")}] based on issue title.\n\n**TH:** ระบบได้เพิ่ม Label [${labels.join(", ")}] ตามชื่อ Issue`
                });
              }
            }

            // --- Review Old PRs ---
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            const now = new Date();
            const thresholdDays = 7;
            const thresholdMs = thresholdDays * 24 * 60 * 60 * 1000;

            for (const pr of prs) {
              const created = new Date(pr.created_at);
              const ageMs = now - created;

              if (ageMs > thresholdMs) {
                await github.rest.issues.addLabels({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: ["stale-pr"]
                });

                await github.rest.issues.createComment({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `🤖 Auto-review: This PR has been open for more than ${thresholdDays} days. Please review or close if no longer needed.\n\n**TH:** Pull Request นี้เปิดมานานเกิน ${thresholdDays} วันแล้ว กรุณาตรวจสอบหรือปิดหากไม่จำเป็น`
                });
              }
            }
