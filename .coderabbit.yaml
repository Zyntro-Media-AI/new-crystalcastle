# CrystalCastle Governance Config
early_access: true

slack_agent:
  channel: "#crystalcastle-review"   # Slack channel สำหรับแจ้งเตือน
  scopes:
    - name: crystalcastle-pr-review
      repos: ["1napz/crystalcastle"]
      spend_limit: 100
      connections:
        - github
        - jira
        - notion

governance_rules:
  - id: bilingual-docs
    description: "PR ต้องมีเอกสาร bilingual (TH/EN)"
    notify: slack
  - id: artifacts-cleanup
    description: "Artifacts ต้องถูกลบ/Archive หลังรีวิวเสร็จ"
    notify: slack
  - id: frontend-watch
    description: "แจ้งเตือนเมื่อมีการแก้ไขใน frontend/"
    notify: slack
  - id: compliance-summary
    description: "Sync compliance-summary.json เข้ากับ dashboard"
    notify: slack