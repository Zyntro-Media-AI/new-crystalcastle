name: Auto-Fix package-lock.json

on:
  push:
    branches: [main]
    paths:
      - 'package-lock.json'
  workflow_dispatch:  # ให้รันด้วยมือได้ถ้าต้องการ

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}  # สำคัญ! ต้องใช้ PAT เพื่อ push กลับได้

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ตรวจสอบว่า package-lock.json parse ได้หรือไม่
        id: check
        run: |
          if node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8'))" 2>/dev/null; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: สร้าง package-lock.json ใหม่ถ้าเสียหาย
        if: steps.check.outputs.valid == 'false'
        run: |
          rm -f package-lock.json
          npm install
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package-lock.json
          git commit -m "fix: regenerate corrupted package-lock.json automatically"
          git push
