name: PR Automation - Testcase + Test

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  testcase-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🧠 Generate testcase file
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          SAFE_TITLE=$(echo "$PR_TITLE" \
            | tr ' ' '-' \
            | tr -cd '[:alnum:]-')

          mkdir -p crystalcastle/testcase

          FILE_PATH="crystalcastle/testcase/test-${SAFE_TITLE}.txt"

          echo "PR Number: $PR_NUMBER" > "$FILE_PATH"
          echo "PR Title: $PR_TITLE" >> "$FILE_PATH"
          echo "Created At: $(date)" >> "$FILE_PATH"

          echo "Generated: $FILE_PATH"

      - name: 📤 Commit testcase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add crystalcastle/testcase/

          git diff --cached --quiet || git commit -m "chore(testcase): add testcase for PR #${{ github.event.pull_request.number }}"
          git push

      # -------------------------
      # 🧪 Run Test (Gradle)
      # -------------------------
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🔧 Grant execute permission
        run: chmod +x gradlew

      - name: 🧪 Run tests
        run: ./gradlew test

      # -------------------------
      # 📊 Upload Test Report
      # -------------------------
      - name: 📎 Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      # -------------------------
      # 💬 Comment on PR
      # -------------------------
      - name: 💬 Comment PR with result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const status = "${{ job.status }}";

            github.rest.issues.createComment({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🧪 Test Result: **${status}**
📁 Testcase file created in \`crystalcastle/testcase/\`
📊 Download report in Actions > Artifacts`
            });