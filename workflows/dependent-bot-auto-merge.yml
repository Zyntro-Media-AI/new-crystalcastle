# .github/workflows/dependabot-auto-merge.yml
name: Dependentbot Auto-merge

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    
    # ✅ ใช้เงื่อนไขที่ถูกต้อง:
    # - PR ต้องมาจาก dependentbot[bot]
    # - label ที่เพิ่มต้องชื่อ 'dependabot' (หรือตามที่คุณตั้ง)
    if: |
      github.event.pull_request.user.login == 'dependentbot[bot]' && 
      github.event.label.name == 'dependentbot'
    
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}