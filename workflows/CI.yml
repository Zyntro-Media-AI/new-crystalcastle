name: 🧪 CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:
  checks:
    name: 🔎 Lint + Type + Test + AI
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install deps
        run: npm ci

      - name: 🔍 Type check
        run: npm run typecheck

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Unit test
        run: npm test

      - name: 🤖 AI Mock Test
        run: npm run test:ai

      - name: 🏗 Build
        run: npm run build
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install deps
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🔍 Type check
        run: npm run typecheck

      - name: 🧪 Unit tests
        run: npm test -- --coverage

      - name: 🤖 AI mock tests
        run: npm run test:ai

      - name: 📊 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  build:
    name: 🏗 Build
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: 📦 Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  ai-metrics:
    name: ⚡ AI Benchmark & Metrics
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      - name: ⚡ Run benchmark
        run: node scripts/benchmark.ts

      - name: 📤 Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json

  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      - name: 🔍 npm audit (high only)
        run: npm audit --audit-level=high || true

  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [checks, build, ai-metrics, security]

    steps:
      - run: echo "✅ CI passed"
      - name: 📊 Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  ai-test:
    name: 🤖 AI Mock Test
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test:ai

  build:
    name: 🏗 Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, ai-test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  benchmark:
    name: ⚡ AI Benchmark
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      - name: ⚡ Run benchmark
        run: node scripts/benchmark.ts

      - name: 📤 Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json

  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      - name: 🔍 Audit dependencies
        run: npm audit --audit-level=high || true

  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [build, benchmark, security]

    steps:
      - name: ✅ CI Passed
        run: echo "All checks passed 🚀"
