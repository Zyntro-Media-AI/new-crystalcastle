name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: 📦 Install
        run: npm install

      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: crystalcastle-build
          path: dist/