name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ เพิ่มแล้ว
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check syntax
        run: node --check api/*.js 2>/dev/null || echo "Syntax check completed"
      
      - name: Check for exposed secrets
        run: |
          grep -r "sb_publishable_\|sk-\|gsk_\|eyJ" --exclude-dir=node_modules --exclude-dir=.git . && echo "⚠️ WARNING: Potential secrets found!" || echo "✅ No secrets found"
