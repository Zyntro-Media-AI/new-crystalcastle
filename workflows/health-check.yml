name: Health Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Check API health
        id: api-check
        run: |
          set +e

          response=$(curl -s -o /dev/null -w "%{http_code}" https://your-api.com/health)
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            response="000"
          fi

          if [ "$response" = "200" ]; then
            echo "status=healthy" >> $GITHUB_OUTPUT
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
          fi

      - name: Open or update GitHub Issue on failure
        if: steps.api-check.outputs.status == 'unhealthy'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 API Health Check Failed"
            const label = "health-check"

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label
            });

            const existing = issues.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: "Still failing at " + new Date().toISOString()
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: "Health check failed. API is unreachable or returned non-200.",
                labels: [label]
              });
            }
