<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Crystal Castle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        // ใช้ Supabase credentials จากไฟล์ที่มีอยู่
        const SUPABASE_URL = 'https://wqkreaoqkunjhlzzdimd.supabase.co'
        const SUPABASE_ANON_KEY = 'sb_publishable_g4wlvVA-eASs1SMRGSIatA_Gk4Nu13c'
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        // ตรวจสอบว่าล็อกอินอยู่แล้วหรือไม่
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession()
            if (session) {
                window.location.href = '/product.html'
            }
        }

        // Login with Google
        window.loginWithGoogle = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/product.html' }
            })
            if (error) alert('Login failed: ' + error.message)
        }

        // Login with Email (Magic Link)
        window.loginWithEmail = async () => {
            const email = document.getElementById('email').value
            if (!email) return alert('กรุณากรอกอีเมล')
            
            const { error } = await supabase.auth.signInWithOtp({ 
                email,
                options: { emailRedirectTo: window.location.origin + '/product.html' }
            })
            if (error) alert(error.message)
            else alert('ตรวจสอบอีเมลของคุณเพื่อรับลิงก์เข้าสู่ระบบ')
        }

        checkSession()
    </script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🏰</div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Crystal Castle</h1>
            <p class="text-gray-400 mt-2">เข้าสู่ระบบเพื่อสร้างวิดีโอ AI</p>
        </div>

        <div class="bg-gray-800 rounded-2xl p-6 shadow-xl">
            <button onclick="loginWithGoogle()" class="w-full bg-white text-gray-800 p-3 rounded-xl font-medium hover:bg-gray-100 transition flex items-center justify-center gap-2 mb-4">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                เข้าสู่ระบบด้วย Google
            </button>

            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-600"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-2 bg-gray-800 text-gray-400">หรือ</span></div>
            </div>

            <input type="email" id="email" placeholder="อีเมลของคุณ" class="w-full p-3 rounded-xl bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500 mb-3">
            <button onclick="loginWithEmail()" class="w-full bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-xl font-medium transition">
                ส่งลิงก์เข้าสู่ระบบทางอีเมล
            </button>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">เข้าสู่ระบบเพื่อใช้บริการ Crystal Castle AI Video Generator</p>
    </div>
</body>
</html>
