<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Crystal Castle — AI Video Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans Thai', system-ui, -apple-system, sans-serif; background: #f5f7fb; }
  .status-card { transition: all 0.2s ease; }
  .status-card:hover { transform: translateY(-2px); }
</style>
</head>
<body class="text-slate-800 antialiased">

<div class="max-w-xl mx-auto min-h-screen relative pb-28">
  
  <!-- Header -->
  <header class="sticky top-0 z-30 backdrop-blur-xl">
    <div class="bg-gradient-to-r from-violet-600 via-indigo-600 to-blue-600 px-5 pt-6 pb-8 rounded-b-[2rem] shadow-lg shadow-indigo-500/20">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3l7 4v5c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V7l7-4z"/></svg>
          </div>
          <div>
            <h1 class="text-white text-xl font-semibold tracking-tight">Crystal Castle</h1>
            <p id="userName" class="text-white/70 text-[11px] -mt-0.5">สวัสดี User</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <a href="/artifact.html" class="text-white/80 text-xs bg-white/10 px-3 py-1.5 rounded-full hover:bg-white/20 transition">📁 ผลงาน</a>
          <button id="logoutBtn" class="text-white/80 text-xs bg-white/10 px-3 py-1.5 rounded-full hover:bg-red-500/30 transition">🚪 ออกจากระบบ</button>
        </div>
      </div>
    </div>
  </header>

  <main class="px-4 -mt-5 space-y-4 relative z-10">
    
    <!-- ส่วนที่ 1: อัปโหลดรูป -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">1</span>
        <h2 class="font-semibold text-slate-900">อัปโหลดรูปสินค้า</h2>
      </div>
      
      <div class="grid grid-cols-2 gap-2.5 mb-3">
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <button id="uploadBtn" type="button" class="h-12 rounded-xl bg-slate-900 text-white text-sm font-medium active:scale-[0.98] transition shadow-sm">
          📷 เลือกไฟล์
        </button>
        <button id="tiktokBtn" type="button" class="h-12 rounded-xl bg-slate-100 text-slate-800 text-sm font-medium hover:bg-slate-200 active:scale-[0.98] transition">
          🎵 TikTok
        </button>
      </div>

      <div id="tiktokInputWrap" class="hidden mb-3">
        <input id="tiktokInput" type="url" placeholder="https://www.tiktok.com/..." class="w-full h-11 px-4 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
      </div>

      <div id="previewGrid" class="grid grid-cols-3 gap-2">
        <div class="aspect-square rounded-xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16l4-4 4-4 4 4M12 12v-2M12 8v-2M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z"/></svg>
          <span class="text-[11px] mt-1">ยังไม่มีรูป</span>
        </div>
      </div>
      <p class="text-[11px] text-slate-500 mt-2.5">รองรับ JPG, PNG (สูงสุด 10 รูป)</p>
    </section>

    <!-- ส่วนที่ 2: รายละเอียดสินค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">2</span>
        <h2 class="font-semibold text-slate-900">รายละเอียดสินค้า</h2>
      </div>
      
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">วันที่</label>
          <input id="dateInput" readonly class="w-full h-11 px-3 rounded-xl bg-slate-50 border border-slate-200 text-sm">
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">หมวดหมู่</label>
          <select id="categorySelect" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
            <option value="Menswear">Menswear</option>
            <option value="Womenswear">Womenswear</option>
            <option value="Accessories">Accessories</option>
            <option value="Shoes">Shoes</option>
            <option value="Bags">Bags</option>
          </select>
        </div>
        <div class="col-span-2">
          <label class="text-xs text-slate-500 mb-1 block">แบรนด์ / รุ่น</label>
          <input id="brandInput" placeholder="เช่น Uniqlo, Nike, Adidas" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <div class="col-span-2">
          <label class="text-xs text-slate-500 mb-1 block">ชื่อไฟล์</label>
          <input id="filenameInput" readonly class="w-full h-11 px-3 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-600 font-mono">
        </div>
      </div>
    </section>

    <!-- ส่วนที่ 3: คำสั่งวิดีโอ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">3</span>
          <h2 class="font-semibold text-slate-900">คำสั่งสร้างวิดีโอ</h2>
        </div>
        <button id="genPromptBtn" type="button" class="text-xs font-medium text-violet-600 bg-violet-50 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">
          ✨ AI ช่วยคิด
        </button>
      </div>
      <textarea id="promptInput" rows="3" placeholder="อธิบายลักษณะวิดีโอที่ต้องการ..." class="w-full p-3.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 resize-none"></textarea>
      <div id="promptStatus" class="text-xs text-slate-400 mt-1 flex justify-between items-center">
        <span></span>
        <div class="flex gap-2">
          <button id="copyPromptBtn" class="hidden text-violet-500 hover:text-violet-700">📋 คัดลอก</button>
          <button id="undoPromptBtn" class="hidden text-amber-500 hover:text-amber-700">↩️ กลับต้นฉบับ</button>
        </div>
      </div>
    </section>

    <!-- ส่วนที่ 4: แคปชั่นโพสต์ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">4</span>
          <h2 class="font-semibold text-slate-900">แคปชั่นโพสต์</h2>
        </div>
        <button id="genPostBtn" type="button" class="text-xs font-medium text-violet-600 bg-violet-50 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">
          ✍️ สร้างแคปชั่น
        </button>
      </div>
      <textarea id="postOutput" rows="3" readonly placeholder="กดปุ่มเพื่อสร้างแคปชั่นอัตโนมัติตามรายละเอียดสินค้า" class="w-full p-3.5 rounded-xl border border-slate-200 text-sm bg-slate-50 resize-none"></textarea>
      <div class="flex justify-end mt-1">
        <button id="copyPostBtn" class="hidden text-xs text-violet-500 hover:text-violet-700">📋 คัดลอกแคปชั่น</button>
      </div>
    </section>

    <!-- ส่วนที่ 5: เลือกเครื่องมือ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-3">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">5</span>
        <h2 class="font-semibold text-slate-900">เลือกเครื่องมือ</h2>
      </div>
      <div class="grid grid-cols-4 gap-2">
        <button id="genFALBtn" class="h-12 rounded-xl bg-gradient-to-r from-purple-600 to-pink-600 text-white text-sm font-medium shadow-sm hover:shadow-md transition active:scale-[0.98]">
          🎬 Kling
        </button>
        <button id="genHFBtn" class="h-12 rounded-xl bg-emerald-600 text-white text-sm font-medium shadow-sm hover:shadow-md transition active:scale-[0.98]">
          ✨ Magic
        </button>
        <button id="genSlideshowBtn" class="h-12 rounded-xl bg-amber-600 text-white text-sm font-medium shadow-sm hover:shadow-md transition active:scale-[0.98]">
          🎞️ สไลด์โชว์
        </button>
        <button id="genTikTokBtn" class="h-12 rounded-xl bg-gradient-to-r from-red-500 to-pink-500 text-white text-sm font-medium shadow-sm hover:shadow-md transition active:scale-[0.98]">
          🎬 TikTok
        </button>
      </div>
      <p class="text-[11px] text-slate-500 mt-2 text-center">
        Kling (จ่าย) • Magic Hour (ฟรี) • สไลด์โชว์ (ฟรี) • TikTok Video (ฟรี สร้างจากรูป)
      </p>
    </section>

    <!-- สถานะ -->
    <div id="statusText" class="text-center text-sm text-slate-500 py-2 hidden"></div>

  </main>

  <!-- ปุ่มสร้างวิดีโอ -->
  <div class="fixed bottom-0 inset-x-0 z-40">
    <div class="max-w-xl mx-auto px-4 pb-5 pt-2 bg-gradient-to-t from-white via-white/95 to-transparent">
      <button id="generateBtn" class="w-full h-14 rounded-xl bg-slate-900 text-white font-semibold shadow-lg shadow-slate-900/20 active:scale-[0.98] transition disabled:opacity-50 disabled:cursor-not-allowed">
        🎥 สร้างวิดีโอเลย
      </button>
    </div>
  </div>
</div>

<script src="product.js"></script>
</body>
</html>
