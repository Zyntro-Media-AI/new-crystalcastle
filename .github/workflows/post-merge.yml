name: 🚀 Post-Merge CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  post-merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🐳 Build Docker image
        run: docker build -t crystalcastle:latest .

      - name: 🚀 Deploy
        if: success()
        run: ./scripts/deploy.sh

      - name: 📚 Build docs
        if: always()
        run: npm run docs:build

      - name: 📣 Notify team
        if: always()
        uses: slackapi/slack-github-action@v1.23.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        with:
          payload: |
            {
              "text": "🚀 Deploy completed for CrystalCastle (main)"
            }