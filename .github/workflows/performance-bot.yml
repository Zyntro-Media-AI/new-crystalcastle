name: 🤖 Auto Review + Cache Maintenance

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load CodeRabbit config
        id: config
        run: |
          if [ -f ".coderabbit.yml" ]; then
            echo "CONFIG=$(cat .coderabbit.yml | yq -o=json)" >> $GITHUB_ENV
          else
            echo "CONFIG={}" >> $GITHUB_ENV
          fi

      - name: Auto review issues & PRs
        uses: actions/github-script@v7
        with:
          script: |
            const config = JSON.parse(process.env.CONFIG || '{}');

            // --- Review Issues ---
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 50
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;
              const title = issue.title.toLowerCase();
              let labels = [];

              if (title.includes("bug") || title.includes("fix")) labels.push("bug");
              if (title.includes("feature") || title.includes("enhancement")) labels.push("enhancement");
              if (title.includes("docs") || title.includes("doc")) labels.push("documentation");

              if (labels.length > 0) {
                await github.rest.issues.addLabels({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels
                });

                await github.rest.issues.createComment({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `🤖 Auto-review: Applied labels [${labels.join(", ")}].\n\n**TH:** ระบบได้เพิ่ม Label [${labels.join(", ")}] ตามชื่อ Issue`
                });
              }
            }

            // --- Review Old PRs ---
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 50
            });

            const now = new Date();
            const thresholdDays = config.threshold_days || 7;
            const thresholdMs = thresholdDays * 24 * 60 * 60 * 1000;
            const feedback = config.feedback || [
              "Add security scan step (`npm audit`)",
              "Update bilingual docs in `docs/release-notes.md`",
              "Respect folder structure (`src/`, `tests/`, `docs/`)"
            ];

            for (const pr of prs) {
              const created = new Date(pr.created_at);
              const ageMs = now - created;

              if (ageMs > thresholdMs) {
                await github.rest.issues.addLabels({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: ["stale-pr"]
                });

                await github.rest.issues.createComment({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `### 🧩 Auto-Response (CodeRabbit Guide)

**English:**
CodeRabbit suggests:
- ${feedback.join("\n- ")}

⚠️ This PR has been open for more than ${thresholdDays} days.

**ไทย:**
CodeRabbit แนะนำ:
- ${feedback.join("\n- ")}

⚠️ Pull Request นี้เปิดมานานเกิน ${thresholdDays} วันแล้ว`
                });

                if (pr.mergeable_state === "clean") {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: "merge"
                  });
                }
              }
            }

      - name: Log & Cleanup Caches
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            console.log("📜 Cache usage report:");
            for (const cache of data.actions_caches) {
              console.log(`ID: ${cache.id}, Key: ${cache.key}, Size: ${(cache.size_in_bytes/1024/1024).toFixed(2)} MB, Last used: ${cache.last_accessed_at}`);

              const lastUsed = new Date(cache.last_accessed_at);
              const cutoff = new Date(Date.now() - 14*24*60*60*1000); // 14 days
              if (lastUsed < cutoff) {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id
                });
                console.log(`🗑️ Deleted cache ${cache.key} (older than 14 days)`);
              }
            }
