name: CrystalCastle AI Pipeline

on:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9

jobs:
  validate:
    name: Validate Structure & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify AI Architecture
        run: |
          echo "Checking AI architecture..."

          test -d src/ai/prompts || (echo "Missing src/ai/prompts" && exit 1)
          test -d src/ai/pipelines || (echo "Missing src/ai/pipelines" && exit 1)
          test -d src/ai/providers || (echo "Missing src/ai/providers" && exit 1)

          test -d src/core/video || (echo "Missing src/core/video" && exit 1)
          test -d src/core/render || (echo "Missing src/core/render" && exit 1)
          test -d src/core/captions || (echo "Missing src/core/captions" && exit 1)

          echo "Architecture OK"

      - name: Run ESLint
        run: pnpm lint

      - name: Run Type Check
        run: pnpm exec tsc --noEmit

  ai-tests:
    name: AI Pipeline Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Prompt Engine
        run: |
          if [ -d "src/ai/prompts" ]; then
            echo "Prompt engine detected"
          fi

      - name: Test AI Providers
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing AI provider abstraction..."

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY missing"
          fi

          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY missing"
          fi

      - name: Run Unit Tests
        run: pnpm test -- --runInBand

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs:
      - validate
      - ai-tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js App
        run: pnpm build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crystalcastle-build
          path: |
            .next
            public
            package.json

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency Audit
        run: pnpm audit --audit-level high

      - name: Secret Scan
        run: |
          echo "Scanning for exposed secrets..."

          ! grep -R "sk-" . --exclude-dir=node_modules || exit 1
          ! grep -R "AIza" . --exclude-dir=node_modules || exit 1

          echo "No leaked secrets detected"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trigger Vercel Preview
        run: |
          echo "Preview deployment ready"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - build
      - security

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Deploying CrystalCastle to production..."