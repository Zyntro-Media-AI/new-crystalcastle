name: Commit & PR Metadata Enforcement

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  commitlint:
    name: 📝 Commit Message Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
      - name: Lint commit messages
        run: |
          git log --format=%s -n 10 | commitlint

  pr-title:
    name: 📌 PR Title Enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            if (!title || title.trim() === "") {
              const commits = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number
              });
              const subject = commits.data[0].commit.message.split("\n")[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                title: subject
              });
            }

  pr-description:
    name: 📑 PR Description Scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.trim() === "") {
              const template = `
### 📌 Summary
Auto-generated PR description.

### 🔄 Changes
- Consolidated workflows into .github/workflows
- Enforced commit message linting
- Auto-set PR title

### ✅ Note
workflow already merged from crystalcastle/workflows to .github/workflows
              `;
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: template
              });
            }

  pr-comment:
    name: 🤖 Auto Comment Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "✅ PR metadata generated: commit messages linted, PR title enforced, PR description scaffolded."
            });
