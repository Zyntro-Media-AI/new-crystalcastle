name: Monorepo CI/CD with Vercel Remote Cache

on:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  push:
    branches:
      - main
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: your-team-slug
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - run: npm install
      - run: npx turbo run build --filter=apps/web --cache-dir=.turbo
      - run: npx turbo run test --filter=apps/web --cache-dir=.turbo

  docs:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: your-team-slug
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - run: npm install
      - run: npx turbo run build --filter=apps/docs --cache-dir=.turbo
      - run: npx turbo run test --filter=apps/docs --cache-dir=.turbo

  admin:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: your-team-slug
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - run: npm install
      - run: npx turbo run build --filter=apps/admin --cache-dir=.turbo
      - run: npx turbo run test --filter=apps/admin --cache-dir=.turbo

  deploy:
    runs-on: ubuntu-latest
    needs: [web, docs, admin]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: npx vercel --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --prod --confirm
