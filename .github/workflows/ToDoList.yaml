name: Checklist Progress Update

on:
  push:
    paths:
      - "docs/worker/reviewer/reviewer.checklist.md"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Parse Checklist Progress
        run: |
          COMPLETE=$(grep -c "\[x\]" docs/worker/reviewer/reviewer.checklist.md)
          TOTAL=$(grep -c "\[ \]" docs/worker/reviewer/reviewer.checklist.md)
          echo "progress=$COMPLETE/$TOTAL" >> $GITHUB_ENV

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Checklist Progress Update - CrystalCastle"
          body: |
            Reviewer checklist has been updated.
            Progress: ${{ env.progress }}
            Repo: https://github.com/1napz/crystalcastle
          to: nobizzmaru@gmail.com
          from: crystalcastle-bot@repo.local