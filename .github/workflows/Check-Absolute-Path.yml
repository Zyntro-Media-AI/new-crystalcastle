name: Check absolute paths

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *' # รันทุกวัน 02:00 UTC (ปรับเป็นเวลาที่ต้องการ)
# In your workflow .yml files, add concurrency to cancel redundant runs:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests detected; skipping pytest"
          fi

      - name: Run path scanner
        id: scanner
        run: |
          python scripts/scan_paths.py > path_report.md || true
          cat path_report.md

      - name: Create or update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Path Scanner Report
            $(cat path_report.md)
