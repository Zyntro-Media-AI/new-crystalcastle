- name: Create default CODEOWNERS if missing
  if: "!(exists('CODEOWNERS') || exists('.github/CODEOWNERS'))"
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"
    git checkout -b automation/add-codeowners
    mkdir -p .github
    cat > .github/CODEOWNERS <<'EOF'
    # Example CODEOWNERS (generated)
    /scripts/ @team-backend
    /tests/ @team-qa
    EOF
    git add .github/CODEOWNERS
    git commit -m "chore: add CODEOWNERS template (generated by path-scan)"
    git push --set-upstream origin automation/add-codeowners
- name: Open PR for CODEOWNERS
  uses: peter-evans/create-pull-request@v5
  with:
    token: ${{ secrets.GITHUB_TOKEN }}
    title: "chore: add CODEOWNERS template (automation)"
    body: "Auto-generated CODEOWNERS to help path-scan. Please review."
    head: automation/add-codeowners
    base: main