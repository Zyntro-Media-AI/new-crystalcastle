name: QA - AI Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  ai-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run test:ai-keyword   # TC-001
      - run: npm run test:ai-schema    # TC-002