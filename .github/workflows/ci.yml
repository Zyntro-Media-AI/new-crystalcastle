name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Test
        run: npm test

      - name: 🏗️ Build
        run: npm run build

  privacy-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🔒 Privacy Enforcement
        run: |
          echo "Running privacy.yml validation..."
          # ตัวอย่าง: ใช้ script ตรวจสอบ privacy.yml
          cat setup-config/privacy.yml

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🛡️ Security Scan
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"