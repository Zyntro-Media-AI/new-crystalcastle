name: AI Log Summary

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download logs
        uses: actions/download-artifact@v4
        with:
          name: workflow-logs
          path: logs/
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install openai

      - name: Run AI summarizer
        run: node scripts/ai-summarize-log.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit summary
        run: |
          git config user.name "ai-summary-bot"
          git config user.email "bot@users.noreply.github.com"
          git add update/
          git commit -m "🤖 AI log summary ${{ github.run_id }}" || echo "no changes"
          git push