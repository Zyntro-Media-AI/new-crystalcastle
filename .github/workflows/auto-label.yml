name: 🔖 Auto Labeler

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply labels based on title
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request || context.payload.issue;
            if (!pr) return;

            const title = pr.title.toLowerCase();
            const labels = [];

            // 🔧 Bug
            if (title.includes("fix") || title.includes("bug")) {
              labels.push("bug");
            }

            // ✨ Feature
            if (title.includes("feat") || title.includes("feature") || title.includes("enhancement")) {
              labels.push("enhancement");
            }

            // 📚 Documentation
            if (title.includes("docs") || title.includes("doc")) {
              labels.push("documentation");
            }

            // 🔐 Security
            if (title.includes("security") || title.includes("alert")) {
              labels.push("security");
            }

            // ⚙️ CI/CD
            if (title.includes("ci") || title.includes("workflow")) {
              labels.push("ci/cd");
            }

            if (labels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }