jobs:
  precheck-conflict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check merge conflict with main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "❌ Merge conflict detected with main" > version/CrystalCastle/logs/pr-precheck.log
            exit 1
          else
            echo "✅ Branch is up-to-date with main" > version/CrystalCastle/logs/pr-precheck.log
          fi

      - name: Update PR description with Pre-check result
        uses: actions/github-script@v7
        with:
          script: |
            const { readFileSync } = require('fs');
            const precheck = readFileSync('version/CrystalCastle/logs/pr-precheck.log', 'utf8');
            const body = `
            ## 🔎 Pre-check Result
            ${precheck}

            (See full log in version/CrystalCastle/logs/pr-precheck.log)
            `;
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body
            });
name: Backup Bookmarks
on: [workflow_dispatch, schedule]
jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'   # ✅ เพิ่ม caching เพื่อลดเวลา build

      - name: 📦 Install dependencies
        run: npm ci      # ✅ ใช้ npm ci แทน npm install เพื่อ reproducible build

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build project
        run: npm run build

      - name: 🔍 Verify .vercelignore
        run: |
          if [ ! -f ".vercelignore" ]; then
            echo "❌ Missing .vercelignore file"
            exit 1
          fi
          echo "✅ .vercelignore exists"

      - name: 🚀 Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        run: |
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --confirm
    - uses: actions/checkout@v4
    
    - name: Configure Git
      run: |
        git config --local user.email "${{ github.actor }}@users.noreply.github.com"
        git config --local user.name "${{ github.actor }}"
    
    - name: Update files
      run: echo "test" > test.txt
    
    - name: Commit & Push
      run: |
        git add .
        git commit -m "Auto backup" || echo "No changes"
        git push
