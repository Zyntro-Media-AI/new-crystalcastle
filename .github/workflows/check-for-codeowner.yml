      - name: Check for CODEOWNERS
        id: check_codeowners
        run: |
          if [ -f CODEOWNERS ] || [ -f .github/CODEOWNERS ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create CODEOWNERS template and open PR
        if: steps.check_codeowners.outputs.found == 'false' && github.head_ref != '' && startsWith(github.head_ref, 'automation/') == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="automation/add-codeowners-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          mkdir -p .github
          cat > .github/CODEOWNERS <<'EOF'
# Auto-generated CODEOWNERS template. Please review and adjust before merge.
# Example:
# /scripts/ @team-backend
# /tests/ @team-qa
# Add paths and owners as appropriate for your repo.
EOF
          git add .github/CODEOWNERS
          git commit -m "chore: add CODEOWNERS template (generated by automation)"
          git push --set-upstream origin $BRANCH
          # Create PR programmatically using GitHub API
          PR_TITLE="chore: add CODEOWNERS template (automation)"
          PR_BODY="This CODEOWNERS file was auto-generated by the path-scan automation. Please review owners and paths, then merge.

If you want automation to stop creating this PR, add a CODEOWNERS file in the repository root or .github/CODEOWNERS."
          API_URL="https://api.github.com/repos/${{ github.repository }}/pulls"
          curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            -d "{"title":"${PR_TITLE}","head":"${BRANCH}","base":"${{ github.ref_name }}","body":"${PR_BODY}"}" \
            $API_URL | jq '.url, .number'