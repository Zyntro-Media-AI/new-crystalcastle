name: Sync Release Notes to Changelog

on:
  release:
    types: [published]

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🔑 Authenticate with GitHub
        run: echo "${{ secrets.GITHUB_TOKEN }}" > token.txt

      - name: 📡 Fetch Release Notes
        id: fetch
        run: |
          NOTES=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }} \
            | jq -r '.body')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📝 Update CHANGELOG.md
        run: |
          echo "## [${{ github.event.release.tag_name }}] - $(date +'%Y-%m-%d')" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "${{ steps.fetch.outputs.notes }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: 📤 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: sync CHANGELOG with ${{ github.event.release.tag_name }}"
          git push