name: Unified Compliance Report

on:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  pull_request:

jobs:
  compliance-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate compliance report
        run: |
          echo "🔍 Collecting compliance data..."

          # Assume JSONs already generated by frontend-setup.sh or other jobs
          # license-status.json, pr-status.json, issue-status.json, deploy-status.json, ai-key-status.json

          mkdir -p frontend

          # Fallback if missing files
          for file in license-status.json pr-status.json issue-status.json deploy-status.json ai-key-status.json; do
            if [ ! -f frontend/$file ]; then
              echo "{}" > frontend/$file
            fi
          done

      - name: Post PR compliance comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const license = JSON.parse(fs.readFileSync('frontend/license-status.json', 'utf8'));
            const prs = JSON.parse(fs.readFileSync('frontend/pr-status.json', 'utf8'));
            const issues = JSON.parse(fs.readFileSync('frontend/issue-status.json', 'utf8'));
            const deploy = JSON.parse(fs.readFileSync('frontend/deploy-status.json', 'utf8'));
            const keys = JSON.parse(fs.readFileSync('frontend/ai-key-status.json', 'utf8'));

            let comment = "## 🛡️ Governance Compliance Report\n\n";

            // License
            comment += "### 📜 License Status\n";
            comment += `- Root LICENSE: ${license.root?.status || "unknown"}\n`;
            comment += `- Frontend LICENSE: ${license.frontend?.status || "unknown"}\n`;
            comment += `- Docs/license/LICENSE: ${license.docs?.status || "unknown"}\n`;
            comment += `- Notuse/LICENSE: ${license.archive?.status || "unknown"}\n\n`;

            // PRs
            comment += "### 🔍 PR Severity\n";
            prs.forEach(pr => {
              comment += `- PR #${pr.id}: ${pr.title} → ${pr.severity}\n`;
            });
            comment += "\n";

            // Issues
            comment += "### 📝 Issue Severity\n";
            issues.forEach(issue => {
              comment += `- Issue #${issue.id}: ${issue.title} → ${issue.severity}\n`;
            });
            comment += "\n";

            // Deployments
            comment += "### 🚀 Deployment Status\n";
            comment += `- Branch: ${deploy.branch}\n`;
            comment += `- URL: ${deploy.url}\n`;
            comment += `- Cache: ${deploy.cache?.status} (${deploy.cache?.size}, last used ${deploy.cache?.last_used})\n\n`;

            // AI Keys
            comment += "### 🔑 AI Key Context\n";
            comment += `- DevKey: ${keys.dev?.status}, last rotated ${keys.dev?.last_rotated || "N/A"}\n`;
            comment += `- FallbackKey: ${keys.fallback?.status}, last rotated ${keys.fallback?.last_rotated || "N/A"}\n`;
            comment += `- PrdKey: ${keys.prd?.status}, last rotated ${keys.prd?.last_rotated || "N/A"}\n`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
