# .github/workflows/dependabot-merge.yml
name: dependentbot[bot]

on:
  pull_request:
    types: dependentbot[bot]
workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.label.name == 'automerge'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}