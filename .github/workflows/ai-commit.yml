name: AI Commit Extension

on:
  push:
    branches:
      - develop
      - feature/**
      - main

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Diff
        run: |
          git log -1 --pretty=%B > commit.txt
          git diff HEAD~1 HEAD > diff.txt

      - name: AI Summary
        run: |
          python scripts/generate_commit_context.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: output/