version: "3.8"
services:
  app:
    build: .
    container_name: crystalcastle_app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./:/app
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: crystalcastle_db
    environment:
      POSTGRES_USER: crystal
      POSTGRES_PASSWORD: crystalpass
      POSTGRES_DB: crystalcastle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crystal"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crystalcastle_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mock_ai:
    image: ghcr.io/pallets/helloworld:latest
    container_name: crystalcastle_mock_ai
    # Replace with a simple mock service or implement a local mock server
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
