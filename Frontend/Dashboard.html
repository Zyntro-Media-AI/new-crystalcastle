<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrystalCastle – PR Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #eee;
    }
    tr:hover {
      background: #f9f9f9;
    }
    .status {
      padding: 4px 8px;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
    }
    .merged { background: #4caf50; }
    .open { background: #2196f3; }
    .closed { background: #f44336; }
    .severity {
      padding: 4px 8px;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
    }
    .critical { background: #b71c1c; }
    .major { background: #ff9800; }
    .minor { background: #ffc107; color: #000; }
    .info { background: #9e9e9e; }
    a {
      color: #2196f3;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>CrystalCastle – Pull Request Dashboard</h1>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>PR No.</th>
        <th>Title</th>
        <th>Author</th>
        <th>Status</th>
        <th>Severity</th>
        <th>Log</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>2026-05-07</td>
        <td>#42</td>
        <td>Add Login API</td>
        <td>@devA</td>
        <td><span class="status merged">Merged</span></td>
        <td><span class="severity major">Major</span></td>
        <td><a href="../docs/20260507_Logging_42-Add-Login-API.md">View Log</a></td>
      </tr>
      <tr>
        <td>2026-05-06</td>
        <td>#41</td>
        <td>Fix UI Dashboard</td>
        <td>@devB</td>
        <td><span class="status closed">Closed</span></td>
        <td><span class="severity minor">Minor</span></td>
        <td><a href="../docs/20260506_Logging_41-Fix-UI-Dashboard.md">View Log</a></td>
      </tr>
      <tr>
        <td>2026-05-05</td>
        <td>#40</td>
        <td>Implement Severity Tag</td>
        <td>@devC</td>
        <td><span class="status open">Open</span></td>
        <td><span class="severity critical">Critical</span></td>
        <td><a href="../docs/20260505_Logging_40-Implement-Severity-Tag.md">View Log</a></td>
      </tr>
    </tbody>
  </table>
</body>
</html>
